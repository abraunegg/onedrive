name: E2E Testing - Personal Account Shared Folders

on:
  push:
    branches-ignore:
      - master
      - main
    paths:
      - 'src/**'
      - 'ci/**'
      - '.github/workflows/e2e-*.yaml'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  e2e_personal_shared_folders:
    runs-on: ubuntu-latest
    container: fedora:latest
    environment:
      name: e2e-personal-shared-folders
      deployment: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          dnf -y update
          dnf -y group install development-tools
          dnf -y install python3 ldc libcurl-devel sqlite-devel dbus-devel jq

      - name: Build + local install prefix
        run: |
          ./configure --prefix="$PWD/.ci/prefix"
          make -j"$(nproc)"
          make install
          "$PWD/.ci/prefix/bin/onedrive" --version

      - name: Prepare isolated HOME
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/home-personal-shared-folders"
          echo "HOME=$HOME" >> "$GITHUB_ENV"
          echo "XDG_CONFIG_HOME=$HOME/.config" >> "$GITHUB_ENV"
          echo "XDG_CACHE_HOME=$HOME/.cache" >> "$GITHUB_ENV"
          mkdir -p "$HOME"

      - name: Inject refresh token into onedrive config
        env:
          REFRESH_TOKEN_PERSONAL_SHARED_FOLDERS: ${{ secrets.REFRESH_TOKEN_PERSONAL_SHARED_FOLDERS }}
        run: |
          set -euo pipefail
          mkdir -p "$XDG_CONFIG_HOME/onedrive"
          umask 077
          printf "%s" "$REFRESH_TOKEN_PERSONAL_SHARED_FOLDERS" > "$XDG_CONFIG_HOME/onedrive/refresh_token"
          chmod 600 "$XDG_CONFIG_HOME/onedrive/refresh_token"

      - name: Run Personal Shared Folder E2E harness
        env:
          ONEDRIVE_BIN: ${{ github.workspace }}/.ci/prefix/bin/onedrive
          E2E_TARGET: personal-shared-folders
          RUN_ID: ${{ github.run_id }}
          PYTHONUNBUFFERED: "1"
        run: |
          python3 -u ci/e2e/run_personal_shared_folders.py

      - name: Debug rerun failed Personal Shared Folder E2E cases
        if: always()
        env:
          ONEDRIVE_BIN: ${{ github.workspace }}/.ci/prefix/bin/onedrive
          E2E_TARGET: personal-shared-folders
          RUN_ID: ${{ github.run_id }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          if [ ! -f ci/e2e/out/results.json ]; then
            echo "No primary results.json found; skipping debug rerun"
            exit 0
          fi

          failed_cases="$(jq -r '[.cases[] | select(.status=="fail") | .id] | unique | join(",")' ci/e2e/out/results.json)"
          if [ -z "$failed_cases" ]; then
            echo "No failed Personal Shared Folder cases; skipping debug rerun"
            exit 0
          fi

          python3 -u ci/e2e/run_personal_shared_folders.py \
            --debug \
            --output-subdir debug-rerun \
            --run-label debug-rerun \
            --case-id "$failed_cases"

      - name: Upload Personal Shared Folder E2E artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-personal-shared-folders
          path: ci/e2e/out/**

  pr_comment:
    name: Post PR summary comment
    needs: [ e2e_personal_shared_folders ]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download artefact
        uses: actions/download-artifact@v4
        with:
          name: e2e-personal-shared-folders
          path: artifacts/e2e-personal-shared-folders

      - name: Build markdown summary
        id: summary
        run: |
          set -euo pipefail

          f="$(find artifacts/e2e-personal-shared-folders -name results.json -type f | head -n 1 || true)"
          if [ -z "$f" ] || [ ! -f "$f" ]; then
            echo "md=⚠️ Personal Shared Folder E2E ran but results.json was not found." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          total=$(jq -r '.cases | length' "$f")
          passed=$(jq -r '[.cases[] | select(.status=="pass")] | length' "$f")
          failed=$(jq -r '[.cases[] | select(.status=="fail")] | length' "$f")

          failures=$(jq -r '.cases[]
            | select(.status=="fail")
            | "- Test Case \(.id // "????"): \(.name) — \(.reason // "no reason provided")"' "$f" || true)

          md="## Personal Account Shared Folder Testing\n"
          md+="**${total}** Test Cases Run  \n"
          md+="**${passed}** Test Cases Passed  \n"
          md+="**${failed}** Test Cases Failed  \n\n"

          if [ "$failed" -gt 0 ] && [ -n "$failures" ]; then
            md+="### Personal Shared Folder Test Failures\n"
            md+="$failures\n"
          fi

          echo "md<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$md" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Find PR associated with this commit
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: sha
            });

            if (!prs.data.length) {
              core.setOutput("found", "false");
              return;
            }

            core.setOutput("found", "true");
            core.setOutput("number", String(prs.data[0].number));

      - name: Post PR comment
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          COMMENT_MD: ${{ steps.summary.outputs.md }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = Number("${{ steps.pr.outputs.number }}");
            const md = process.env.COMMENT_MD || "⚠️ No summary text produced.";

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: md
            });
