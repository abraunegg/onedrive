          PID=$!

          echo "Started PID: $PID"

          READY=0
          for _ in $(seq 1 180); do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "Process exited before reaching steady state"
              set +e
              wait "$PID"
              RC=$?
              set -e
