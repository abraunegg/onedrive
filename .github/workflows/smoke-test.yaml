          cat "$GDBCONSOLE" || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-monitor-fedora-${{ matrix.fedora }}-logs
          path: /tmp/onedrive-smoke/
          if-no-files-found: warn