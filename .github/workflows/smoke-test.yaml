name: Smoke Test

on:
  push:
    branches:
      - master
      - feature/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu-monitor-exit:
    name: Ubuntu ${{ matrix.ubuntu }} monitor clean exit
    runs-on: ${{ matrix.ubuntu }}
    timeout-minutes: 30
    environment:
      name: smoke-test
      deployment: false
    strategy:
      fail-fast: false
      matrix:
        ubuntu:
          - ubuntu-22.04
          - ubuntu-24.04

    env:
      SMOKE_REFRESH_TOKEN: ${{ secrets.SMOKE_PERSONAL_REFRESH_TOKEN }}

    steps:
      - name: Checkout repository with full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate secret is present
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_REFRESH_TOKEN:-}" ]; then
            echo "SMOKE_PERSONAL_REFRESH_TOKEN is not configured"
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            git \
            curl \
            ldc \
            libcurl4-openssl-dev \
            libsqlite3-dev \
            libsystemd-dev \
            libdbus-1-dev

      - name: Build client
        shell: bash
        run: |
          set -euo pipefail
          ./configure
          make -j"$(nproc)"

      - name: Prepare smoke configuration
        shell: bash
        run: |
          set -euo pipefail

          TESTROOT="$RUNNER_TEMP/onedrive-smoke"
          mkdir -p "$TESTROOT/config" "$TESTROOT/syncdir"

          cat > "$TESTROOT/config/config" <<EOF
          monitor_interval = "300"
          sync_dir = "$TESTROOT/syncdir"
          threads = "1"
          EOF

          printf '%s' "$SMOKE_REFRESH_TOKEN" > "$TESTROOT/config/refresh_token"
          chmod 600 "$TESTROOT/config/refresh_token"

      - name: Run monitor smoke test
        shell: bash
        run: |
          set -euo pipefail

          TESTROOT="$RUNNER_TEMP/onedrive-smoke"
          LOGFILE="$TESTROOT/monitor.log"
          BIN="$GITHUB_WORKSPACE/onedrive"

          "$BIN" --confdir="$TESTROOT/config" --monitor --verbose >"$LOGFILE" 2>&1 &
          PID=$!

          echo "Started PID: $PID"

          READY=0
          for _ in $(seq 1 180); do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "Process exited before reaching steady state"
              set +e
              wait "$PID"
              RC=$?
              set -e
              echo "Early exit code: $RC"
              echo "----- monitor.log -----"
              cat "$LOGFILE" || true
              exit 1
            fi

            if grep -Fq "Sync with Microsoft OneDrive is complete" "$LOGFILE"; then
              READY=1
              break
            fi

            sleep 5
          done

          if [ "$READY" -ne 1 ]; then
            echo "Timed out waiting for steady-state monitor completion"
            kill -TERM "$PID" 2>/dev/null || true
            sleep 5
            kill -KILL "$PID" 2>/dev/null || true
            set +e
            wait "$PID"
            set -e
            echo "----- monitor.log -----"
            cat "$LOGFILE" || true
            exit 1
          fi

          echo "Steady state reached; sending SIGINT"
          kill -INT "$PID"

          set +e
          wait "$PID"
          RC=$?
          set -e

          echo "Exit code: $RC"

          if grep -Eqi 'sigsegv|segmentation fault|aborting|pthread_mutex_destroy failed' "$LOGFILE"; then
            echo "Fatal shutdown pattern detected"
            echo "----- monitor.log -----"
            cat "$LOGFILE" || true
            exit 1
          fi

          if [ "$RC" -eq 139 ]; then
            echo "SIGSEGV exit detected"
            echo "----- monitor.log -----"
            cat "$LOGFILE" || true
            exit 1
          fi

          if [ "$RC" -ne 0 ] && [ "$RC" -ne 130 ]; then
            echo "Unexpected exit code: $RC"
            echo "----- monitor.log -----"
            cat "$LOGFILE" || true
            exit 1
          fi

          echo "Clean shutdown verified"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-monitor-${{ matrix.ubuntu }}-logs
          path: ${{ runner.temp }}/onedrive-smoke/
          if-no-files-found: warn

  fedora-monitor-exit:
    name: Fedora ${{ matrix.fedora }} monitor clean exit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: smoke-test
      deployment: false
    strategy:
      fail-fast: false
      matrix:
        fedora:
          - "42"
          - "43"

    container:
      image: fedora:${{ matrix.fedora }}

    env:
      SMOKE_REFRESH_TOKEN: ${{ secrets.SMOKE_PERSONAL_REFRESH_TOKEN }}

    steps:
      - name: Checkout repository with full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate secret is present
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_REFRESH_TOKEN:-}" ]; then
            echo "SMOKE_PERSONAL_REFRESH_TOKEN is not configured"
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          dnf -y update
          dnf -y group install development-tools
          dnf -y install \
            git \
            curl \
            ldc \
            libcurl-devel \
            sqlite-devel \
            dbus-devel \
            which \
            procps-ng

      - name: Build client
        shell: bash
        run: |
          set -euo pipefail
          ./configure
          make -j"$(nproc)"

      - name: Prepare smoke configuration
        shell: bash
        run: |
          set -euo pipefail

          TESTROOT="/tmp/onedrive-smoke"
          mkdir -p "$TESTROOT/config" "$TESTROOT/syncdir"

          cat > "$TESTROOT/config/config" <<EOF
          monitor_interval = "300"
          sync_dir = "$TESTROOT/syncdir"
          threads = "1"
          EOF

          printf '%s' "$SMOKE_REFRESH_TOKEN" > "$TESTROOT/config/refresh_token"
          chmod 600 "$TESTROOT/config/refresh_token"

      - name: Run monitor smoke test
        shell: bash
        run: |
          set -euo pipefail

          TESTROOT="/tmp/onedrive-smoke"
          LOGFILE="$TESTROOT/monitor.log"
          BIN="$GITHUB_WORKSPACE/onedrive"

          "$BIN" --confdir="$TESTROOT/config" --monitor --verbose >"$LOGFILE" 2>&1 &
          PID=$!

          echo "Started PID: $PID"

          READY=0
          for _ in $(seq 1 180); do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "Process exited before reaching steady state"
              set +e
              wait "$PID"
              RC=$?
              set -e
              echo "Early exit code: $RC"
              echo "----- monitor.log -----"
              cat "$LOGFILE" || true
              exit 1
            fi

            if grep -Fq "Sync with Microsoft OneDrive is complete" "$LOGFILE"; then
              READY=1
              break
            fi

            sleep 5
          done

          if [ "$READY" -ne 1 ]; then
            echo "Timed out waiting for steady-state monitor completion"
            kill -TERM "$PID" 2>/dev/null || true
            sleep 5
            kill -KILL "$PID" 2>/dev/null || true
            set +e
            wait "$PID"
            set -e
            echo "----- monitor.log -----"
            cat "$LOGFILE" || true
            exit 1
          fi

          echo "Steady state reached; sending SIGINT"
          kill -INT "$PID"

          set +e
          wait "$PID"
          RC=$?
          set -e

          echo "Exit code: $RC"

          if grep -Eqi 'sigsegv|segmentation fault|aborting|pthread_mutex_destroy failed' "$LOGFILE"; then
            echo "Fatal shutdown pattern detected"
            echo "----- monitor.log -----"
            cat "$LOGFILE" || true
            exit 1
          fi

          if [ "$RC" -eq 139 ]; then
            echo "SIGSEGV exit detected"
            echo "----- monitor.log -----"
            cat "$LOGFILE" || true
            exit 1
          fi

          if [ "$RC" -ne 0 ] && [ "$RC" -ne 130 ]; then
            echo "Unexpected exit code: $RC"
            echo "----- monitor.log -----"
            cat "$LOGFILE" || true
            exit 1
          fi

          echo "Clean shutdown verified"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-monitor-fedora-${{ matrix.fedora }}-logs
          path: /tmp/onedrive-smoke/
          if-no-files-found: warn